name: Validate application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: npm install --include=dev --no-audit --no-fund

      - name: Validate server modules
        run: |
          node --check apps/server/src/index.js
          node --check apps/server/src/start.js
          node --check apps/server/src/db.js
          node --check apps/server/src/schema.js
          node --check apps/server/src/feature-io.js
          node --check apps/server/src/feature-mount.js
          node --check apps/server/src/feature-router.js
          node --check apps/server/src/feature-state.js
          node --check apps/server/src/feature-chats.js
          node --check apps/server/src/feature-interactions.js
          node --check apps/server/src/feature-message-pages.js
          node --check apps/server/src/feature-rss-proxy.js
          node --check apps/server/src/feature-pack.js
          node --check apps/server/src/feature-online.js
          node --check apps/server/src/feature-avatar.js
          node --check apps/server/src/heartbeat-state.js

      - name: Validate client helpers
        run: |
          node --check apps/client/src/feature-pack-ui.js
          node --check apps/client/src/profile-page.js

      - name: Build web client
        run: npm run build -w @verdant/client
