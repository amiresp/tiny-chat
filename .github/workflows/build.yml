name: Build clients
on:
  workflow_dispatch:
  push:
    tags: ['v*']
permissions: { contents: write }
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm install
      - run: npm run electron:build
      - uses: actions/upload-artifact@v4
        with: { name: verdant-windows, path: apps/client/release/* }
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: npm install
      - run: npm run build -w @verdant/client
      - run: npx cap add android
        working-directory: apps/client
      - run: npx cap sync android
        working-directory: apps/client
      - run: chmod +x gradlew && ./gradlew assembleDebug
        working-directory: apps/client/android
      - uses: actions/upload-artifact@v4
        with: { name: verdant-android-apk, path: apps/client/android/app/build/outputs/apk/debug/app-debug.apk }
