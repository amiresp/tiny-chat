name: Build V2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/client-v2/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-v2.yml'

permissions:
  contents: read

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: npm install --include=dev --no-audit --no-fund

      - name: Build Ionic web app
        run: npm run build -w @verdant/client-v2

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: verdant-client-v2-web
          path: apps/client-v2/dist
          if-no-files-found: error

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Use Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: npm install --include=dev --no-audit --no-fund

      - name: Build Android APK
        working-directory: apps/client-v2
        run: npm run android:build

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: verdant-client-v2-android-debug
          path: apps/client-v2/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  windows:
    name: Windows desktop
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: npm install --include=dev --no-audit --no-fund

      - name: Build Windows app
        working-directory: apps/client-v2
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verdant-client-v2-windows
          path: |
            apps/client-v2/release/*.exe
            apps/client-v2/release/*.blockmap
          if-no-files-found: error
