services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file: .env
    volumes:
      - verdant-data:/app/data
      - verdant-uploads:/app/storage/uploads
    restart: unless-stopped
    networks:
      - default

  web:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    depends_on:
      - server
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.tiny-chat.rule=Host(`chat.evaonline.ir`)
      - traefik.http.routers.tiny-chat.entrypoints=websecure
      - traefik.http.routers.tiny-chat.tls=true
      - traefik.http.services.tiny-chat.loadbalancer.server.port=80
    networks:
      - default
      - proxy

volumes:
  verdant-data:
  verdant-uploads:

networks:
  proxy:
    external: true
