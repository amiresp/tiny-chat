services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file: .env
    volumes:
      - verdant-data:/app/data
      - verdant-uploads:/app/storage/uploads
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  verdant-data:
  verdant-uploads:
