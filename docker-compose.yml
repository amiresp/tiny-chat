services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    env_file:
      - .env
    expose:
      - "9997"
    volumes:
      - verdant-data:/app/data
      - verdant-uploads:/app/storage/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:9997/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.tiny-chat.rule=Host(`chat.evaonline.ir`)
      - traefik.http.routers.tiny-chat.entrypoints=websecure
      - traefik.http.routers.tiny-chat.tls=true
      - traefik.http.services.tiny-chat.loadbalancer.server.port=80
    networks:
      - internal
      - proxy

volumes:
  verdant-data:
  verdant-uploads:

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: proxy
